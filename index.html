<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Press Releases Listing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/news.css">
    <link rel="stylesheet" href="styles/filters.css">
    <link rel="stylesheet" href="styles/card.css">
    <link rel="stylesheet" href="styles/pagination.css">
</head>

<body>
    <main>
        <section class="news">
            <div class="container">
                <header>
                    <h1 class="news__title">News</h1>
                </header>
                <div class="news__filters">
                    <div class="news__chips" role="group" aria-label="Filter news by category">
                        <button type="button" class="news__chip news__chip--active" aria-pressed="true"
                            data-category="all">
                            All news
                        </button>
                        <button type="button" class="news__chip" aria-pressed="false" data-category="regulatory">
                            Regulatory
                        </button>
                        <button type="button" class="news__chip" aria-pressed="false" data-category="non_regulatory">
                            Non Regulatory
                        </button>
                    </div>
                    <div class="news__selects">
                        <select class="news__select" id="typeFilter" name="type" aria-label="Filter by type"></select>
                        <select class="news__select" id="yearFilter" name="year" aria-label="Filter by year"></select>
                    </div>
                </div>
                <div class="news__grid-wrapper">
                    <div class="news__grid" id="newsGrid"></div>

                    <div class="news__grid-overlay" id="newsGridOverlay" aria-hidden="true"></div>
                </div>


                <div class="news__state" id="newsLoading" hidden aria-live="polite">
                    <p>Loading...</p>
                </div>

                <div class="news__state" id="newsError" hidden aria-live="assertive">
                    <p>Something went wrong. Please try again.</p>
                </div>

                <div class="news__state" id="newsEmpty" hidden aria-live="polite">
                    <p>No results found.</p>
                </div>

                <div class="news__pagination" id="newsPagination" hidden>
                    <button type="button" class="news__load-more" id="loadMoreButton" aria-label="Load more news">
                        Load more
                    </button>
                    <div class="news__pagination-nav" id="paginationNav" hidden>
                        <button type="button" class="news__pagination-arrow" id="paginationPrev"
                            aria-label="Previous page">
                            <svg width="24" height="15" viewBox="0 0 24 15" fill="none">
                                <path
                                    d="M8.07123 14.4355C7.6807 14.826 7.04671 14.826 6.65619 14.4355L0.292908 8.07124C-0.0976162 7.68072 -0.0976162 7.0477 0.292908 6.65718L6.65619 0.292922C7.04671 -0.0976019 7.6807 -0.0976019 8.07123 0.292922C8.46149 0.683316 8.46129 1.31647 8.07123 1.70698L3.414 6.36421L22.5029 6.36421C23.0552 6.36421 23.5029 6.81193 23.5029 7.36421C23.5029 7.9165 23.0552 8.36421 22.5029 8.36421L3.414 8.36421L8.07123 13.0214C8.46129 13.412 8.46149 14.0451 8.07123 14.4355Z"
                                    fill="#070C1E" />
                            </svg>
                        </button>
                        <div class="news__pagination-pages" id="paginationPages"></div>
                        <button type="button" class="news__pagination-arrow" id="paginationNext" aria-label="Next page">
                            <svg width="24" height="15" viewBox="0 0 24 15" fill="none">
                                <path
                                    d="M15.4316 0.292895C15.8222 -0.0976297 16.4562 -0.0976296 16.8467 0.292895L23.21 6.65715C23.6005 7.04768 23.6005 7.68069 23.21 8.07122L16.8467 14.4355C16.4562 14.826 15.8222 14.826 15.4316 14.4355C15.0414 14.0451 15.0416 13.4119 15.4316 13.0214L20.0889 8.36418L0.999999 8.36418C0.447714 8.36418 -6.92079e-07 7.91647 -6.43797e-07 7.36418C-5.95515e-07 6.8119 0.447715 6.36418 0.999999 6.36418L20.0889 6.36418L15.4316 1.70696C15.0416 1.31644 15.0414 0.683289 15.4316 0.292895Z"
                                    fill="#070C1E" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>

</body>

</html>
