<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Press Releases Listing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/news.css">
    <link rel="stylesheet" href="styles/chips.css">
    <link rel="stylesheet" href="styles/card.css">
</head>

<body>
    <main>
        <section class="news">
            <div class="container">
                <header>
                    <h1 class="news__title">News</h1>
                </header>
                <div class="news__chips" role="group" aria-label="Filter news by category">
                    <button type="button" class="news__chip news__chip--active" aria-pressed="true" data-category="all">
                        All news
                    </button>
                    <button type="button" class="news__chip" aria-pressed="false" data-category="regulatory">
                        Regulatory
                    </button>
                    <button type="button" class="news__chip" aria-pressed="false" data-category="non_regulatory">
                        Non Regulatory
                    </button>
                </div>

                <div class="news__grid-wrapper">
                    <div class="news__grid" id="newsGrid"></div>

                    <div class="news__grid-overlay" id="newsGridOverlay" aria-hidden="true"></div>
                </div>


                <div class="news__state" id="newsLoading" hidden aria-live="polite">
                    <p>Loading...</p>
                </div>

                <div class="news__state" id="newsError" hidden aria-live="assertive">
                    <p>Something went wrong. Please try again.</p>
                </div>

                <div class="news__state" id="newsEmpty" hidden aria-live="polite">
                    <p>No results found.</p>
                </div>

                <div class="news__actions" id="newsActions" hidden>
                    <button type="button" class="news__load-more" id="loadMoreButton" aria-label="Load more news">
                        Load more
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>

</body>

</html>
