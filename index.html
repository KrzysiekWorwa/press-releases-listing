<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Press Releases Listing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/news.css">
</head>

<body>
    <main>
        <section class="news">
            <div class="container">
                <header>
                    <h1 class="news__title">News</h1>
                </header>
                <div class="news__filters">
                    <div class="news__chips">
                        <button class="news__chip">
                            All news
                        </button>
                        <button class="news__chip">
                            Regulatory
                        </button>
                        <button class="news__chip">
                            Non Regulatory
                        </button>
                    </div>
                    <div class="news__selects">
                        <select class="news__select">
                            <option>Filter by type</option>
                            <option>All</option>
                        </select>

                        <select class="news__select">
                            <option>Filter by year</option>
                            <option>All</option>
                        </select>
                    </div>
                </div>

                <div class="news__grid" id="newsGrid"></div>


                <div class="news__state" id="newsLoading" hidden>
                    <p>Loading...</p>
                </div>

                <div class="news__state" id="newsError" hidden>
                    <p>Something went wrong. Please try again.</p>
                </div>

                <div class="news__actions">
                    <button class="news__button" id="loadMoreButton">
                        Load more
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>

</body>

</html>
